# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Gemini and Claude as pair-programming assistants for architecture validation, math debugging (specifically fixing Optuna weight distributions and proportional scaling), and code review. No candidate data was sent to any LLM at ranking time. The reasoning generator uses deterministic, code-driven f-string templates with FlashText-detected keywords only, ensuring zero hallucination.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline. Phase A (offline): Streams the 100K JSONL, executes structural gate checks (honeypots, pure consultants, academic-only), and computes BGE-small embeddings into a LanceDB vector+FTS index. Phase B (online): Uses FTS/Vector recall with a deterministic 1,200 shortlist cap. Candidates are reranked using a ms-marco-MiniLM cross-encoder, followed by an Optuna-tuned behavioral penalty system (squashing 120-day notice periods and 75-day inactivity). Final composite applies mathematical gap-closing boosts for shipped-to-production evidence. Reasoning is strictly deterministic and dynamically defends JD borderline cases.

