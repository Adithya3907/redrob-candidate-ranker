# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline. Phase A (offline, no time limit): streams the 100K
  candidate pool, runs deterministic honeypot and JD-disqualifier gates,
  extracts structured features plus two text columns, computes BGE-small
  embeddings, writes to LanceDB with FTS and vector indexes built on top.
  Phase B (online, <=5 min): dual-channel FTS + vector recall against
  evidence-of-work vocabulary (not tool names), a deterministic shortlist
  cap, dual-pass cross-encoder reranking against separate technical and
  cultural JD chunks, 4-group behavioral scoring (availability, reliability,
  market demand, platform trust) with Optuna-tuned weights, and a final
  composite with proportional role-fit multipliers (experience band,
  product-company ratio, education tier, tenure, shipper-verb evidence).
  Reasoning is generated from controlled templates citing only structured
  fields and FlashText-detected keywords -- never free text copied from a
  candidate's own summary. Honeypots and JD hard disqualifiers are detected
  deterministically offline and excluded via a zero-cost filter on every
  online query, never scored by the tuned weights.

